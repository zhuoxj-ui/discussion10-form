<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sample Form</title>
  <link rel="stylesheet" href="css/style.css"/>

</head>
<body>
    <main>
        <h1>Grocery Pickup Form</h1>
        <form action="https://formspree.io/f/xvzwlddz" method="post"> Connect to formspree.io
            <fieldset>
                <legend>Discussion_10_Form</legend>
                <label for="first-name">First Name:<span class="required">*</span></label>
                <input type="text" id="first-name" name="first-name" required>

                <label for="last-name">Last Name:<span class="required">*</span></label>
                <input type="text" id="last-name" name="last-name" required>

                <label for="program">Program: </label>
                <input type="text" id="program" name="program">

                <label for="email">Email: <span class="required">*</span></label>
                <input type="email" id="email" name="email" required>

                <label for="birthdate">Date of Birth:</label>
                <input type="date" id="birthdate" name="birthdate">

                <fieldset>
                    <legend>Available Time for Picking Up Grocery</legend>

                    <input type="radio" id="morning" name="available-time" value="morning">
                    <label for="morning">Morning</label>

                    <input type="radio" id="afternoon" name="available-time" value="afternoon">
                    <label for="afternoon">Afternoon</label>

                    <input type="radio" id="evening" name="available-time" value="evening">
                    <label for="evening">Evening</label>

                    <input type="radio" id="weekend" name="available-time" value="weekend">
                    <label for="weekend">Weekend</label>
                </fieldset>

                <input type="submit" value="Submit">
            </fieldset>
        </form>
    </main>
</body>
</html>
